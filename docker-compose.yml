services:
  postgres:
    build: .
    image: openbrain-postgres:local
    container_name: openbrain-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
      - ./backups:/backups
      - ./init:/docker-entrypoint-initdb.d:ro
      - ./config:/etc/postgresql/conf.d:ro
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements,pg_cron
      - -c
      - cron.database_name=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    # Django product layer + OAuth 2.1 authorization server (#73/#74). Signs
    # the EdDSA access tokens the mcp resource server validates offline via the
    # published JWKS. Owns only public.* tables in the shared Postgres; never
    # touches brain.*. On the tailnet, tailscale/serve.json path-splits /oauth
    # and the human paths here while /mcp goes to the mcp container.
    build:
      context: ./web
      dockerfile: Dockerfile
    image: openbrain-web:local
    container_name: openbrain-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # SECRET_KEY, ALLOWED_HOSTS, CSRF_TRUSTED_ORIGINS, OAUTH_*, EMAIL_*,
    # DEFAULT_FROM_EMAIL, BRAIN_MCP_URL + POSTGRES_* come from .env (see
    # .env.example). DB host/port + settings module are inline; production.py
    # builds the connection from discrete POSTGRES_*/PGHOST vars (no DATABASE_URL
    # so a password with URL-significant chars needs no percent-encoding).
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      PGHOST: postgres
      PGPORT: "5432"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz').status==200 else 1)
      interval: 10s
      timeout: 3s
      retries: 5

  # Python MCP server (epic #117). Built from the web image; Caddy routes /mcp
  # here. Overrides the entrypoint to skip migrate/collectstatic — web owns
  # those; run_mcp runs only the brain schema boot-gate before serving.
  mcp:
    image: openbrain-web:local
    container_name: openbrain-mcp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_healthy
    # Secrets/OAuth config (POSTGRES_*, OAUTH_*, BRAIN_MCP_URL, OPENROUTER_API_KEY)
    # come from .env via env_file, same as web. DB host/port + the MCP path are
    # inline; OAUTH_JWKS_URL points at the in-network web service (the AS).
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      PGHOST: postgres
      PGPORT: "5432"
      OAUTH_JWKS_URL: http://web:8000/oauth/jwks.json
      MCP_PATH: /mcp/
    volumes:
      - ./init:/init:ro  # init/NN-*.sql for `brain_ledger migrate` in-container
    entrypoint: ["python", "manage.py"]
    command: ["run_mcp", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Python consolidation worker (epic #117, Slice D). Same image; holds a
  # dedicated LISTEN brain_consolidate connection and runs claim extraction per
  # row the pg_cron tick hands it. A standalone service so consolidation runs
  # independently of the MCP service.
  consolidation:
    image: openbrain-web:local
    container_name: openbrain-consolidation
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      PGHOST: postgres
      PGPORT: "5432"
    entrypoint: ["python", "manage.py"]
    command: ["run_consolidation"]

  caddy:
    # Public-facing edge (#50). Terminates TLS — locally with a
    # self-signed cert via `tls internal`; in prod auto-fetches a
    # Let's Encrypt cert for ${BRAIN_HOSTNAME}. Reverse-proxies the human/OAuth
    # paths to web and /mcp to the Python mcp service (which it path-splits).
    image: caddy:2-alpine
    container_name: openbrain-caddy
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      mcp:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      BRAIN_HOSTNAME: ${BRAIN_HOSTNAME:-localhost}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  tailscale:
    image: tailscale/tailscale:latest
    container_name: openbrain-tailscale
    hostname: ${TS_HOSTNAME:-openbrain-mcp}
    restart: unless-stopped
    # #50: Tailscale is opt-in via the `tailscale` compose profile. Local dev
    # uses Caddy directly; in prod Tailscale is the edge — the
    # tailnet path for the small group plus the public `*.ts.net` Funnel URL
    # for off-tailnet clients. Bring it up explicitly with:
    #   docker compose --profile tailscale up
    profiles:
      - tailscale
    depends_on:
      caddy:
        condition: service_started
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_HOSTNAME: ${TS_HOSTNAME:-openbrain-mcp}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TS_SERVE_CONFIG: /config/serve.json
      TS_EXTRA_ARGS: --reset
    volumes:
      - ts-state:/var/lib/tailscale
      - ./tailscale/serve.json:/config/serve.json:ro

volumes:
  pgdata:
  ts-state:
  caddy-data:
  caddy-config:
