services:
  postgres:
    build: .
    image: openbrain-postgres:local
    container_name: openbrain-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
      - ./backups:/backups
      - ./init:/docker-entrypoint-initdb.d:ro
      - ./config:/etc/postgresql/conf.d:ro
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements,pg_cron
      - -c
      - cron.database_name=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    # Django product layer + OAuth 2.1 authorization server (#73/#74). Signs
    # the EdDSA access tokens the mcp resource server validates offline via the
    # published JWKS. Owns only public.* tables in the shared Postgres; never
    # touches brain.*. On the tailnet, tailscale/serve.json path-splits /oauth
    # and the human paths here while /mcp goes to the mcp container.
    build:
      context: ./web
      dockerfile: Dockerfile
    image: openbrain-web:local
    container_name: openbrain-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    # SECRET_KEY, ALLOWED_HOSTS, CSRF_TRUSTED_ORIGINS, OAUTH_*, EMAIL_*,
    # DEFAULT_FROM_EMAIL, BRAIN_MCP_URL + POSTGRES_* come from .env (see
    # .env.example). DB host/port + settings module are inline; production.py
    # builds the connection from discrete POSTGRES_*/PGHOST vars (no DATABASE_URL
    # so a password with URL-significant chars needs no percent-encoding).
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      PGHOST: postgres
      PGPORT: "5432"
      # Blobstore topology, not secrets: the in-network address the server
      # puts/gets through. The keys, bucket, and the tailnet-facing
      # S3_PUBLIC_ENDPOINT that presigned URLs are signed for come from .env.
      BLOBSTORE_BACKEND: s3
      S3_ENDPOINT: http://minio:9000
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz').status==200 else 1)
      interval: 10s
      timeout: 3s
      retries: 5

  # Python MCP server (epic #117). Built from the web image; Caddy routes /mcp
  # here. Overrides the entrypoint to skip migrate/collectstatic — web owns
  # those; run_mcp runs only the brain schema boot-gate before serving.
  mcp:
    image: openbrain-web:local
    container_name: openbrain-mcp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    # Secrets/OAuth config (POSTGRES_*, OAUTH_*, BRAIN_MCP_URL, OPENROUTER_API_KEY)
    # come from .env via env_file, same as web. DB host/port + the MCP path are
    # inline; OAUTH_JWKS_URL points at the in-network web service (the AS).
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      PGHOST: postgres
      PGPORT: "5432"
      OAUTH_JWKS_URL: http://web:8000/oauth/jwks.json
      MCP_PATH: /mcp/
      # Same blobstore topology as web — capture_image writes through the
      # identical seam, so both services must agree on the endpoint.
      BLOBSTORE_BACKEND: s3
      S3_ENDPOINT: http://minio:9000
    volumes:
      - ./init:/init:ro  # init/NN-*.sql for `brain_ledger migrate` in-container
    entrypoint: ["python", "manage.py"]
    command: ["run_mcp", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Python consolidation worker (epic #117, Slice D). Same image; holds a
  # dedicated LISTEN brain_consolidate connection and runs claim extraction per
  # row the pg_cron tick hands it. A standalone service so consolidation runs
  # independently of the MCP service.
  consolidation:
    image: openbrain-web:local
    container_name: openbrain-consolidation
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      PGHOST: postgres
      PGPORT: "5432"
    entrypoint: ["python", "manage.py"]
    command: ["run_consolidation"]

  # Object store for attachment blobs (#42). The official image is multi-arch,
  # so it runs natively on an Apple Silicon host (Mac mini). Credentials come
  # from .env — never inline here. The S3 API is NOT published to the host:
  # Caddy fronts it on :9000 (see caddy/Caddyfile), so the only reach is the
  # tailnet. Blobs live in their own volume; pg_dump does NOT back them up.
  minio:
    image: minio/minio:latest
    container_name: openbrain-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot bucket create, then exit 0. web/mcp gate on its successful
  # completion so a put never races an absent bucket on a fresh volume.
  minio-init:
    image: minio/mc:latest
    container_name: openbrain-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-brain-attachments}
    entrypoint:
      - sh
      - -c
      - >
        mc alias set live http://minio:9000 "$${S3_ACCESS_KEY}" "$${S3_SECRET_KEY}" &&
        mc mb --ignore-existing "live/$${S3_BUCKET}" &&
        echo "bucket $${S3_BUCKET} ready"

  caddy:
    # Public-facing edge (#50). Terminates TLS — locally with a
    # self-signed cert via `tls internal`; in prod auto-fetches a
    # Let's Encrypt cert for ${BRAIN_HOSTNAME}. Reverse-proxies the human/OAuth
    # paths to web and /mcp to the Python mcp service (which it path-splits).
    # Also fronts minio on :9000 for presigned attachment fetches (tailnet only,
    # never Funnel — see the attachments site block in caddy/Caddyfile).
    image: caddy:2-alpine
    container_name: openbrain-caddy
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      mcp:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      # Attachment reads. Bound to the host so the tailnet IP reaches it; the
      # tailnet is already WireGuard-encrypted. NOT exposed through Funnel.
      - "${ATTACHMENTS_BIND_ADDR:-0.0.0.0}:9000:9000"
    environment:
      BRAIN_HOSTNAME: ${BRAIN_HOSTNAME:-localhost}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  tailscale:
    image: tailscale/tailscale:latest
    container_name: openbrain-tailscale
    hostname: ${TS_HOSTNAME:-openbrain-mcp}
    restart: unless-stopped
    # #50: Tailscale is opt-in via the `tailscale` compose profile. Local dev
    # uses Caddy directly; in prod Tailscale is the edge — the
    # tailnet path for the small group plus the public `*.ts.net` Funnel URL
    # for off-tailnet clients. Bring it up explicitly with:
    #   docker compose --profile tailscale up
    profiles:
      - tailscale
    depends_on:
      caddy:
        condition: service_started
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_HOSTNAME: ${TS_HOSTNAME:-openbrain-mcp}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TS_SERVE_CONFIG: /config/serve.json
      TS_EXTRA_ARGS: --reset
    volumes:
      - ts-state:/var/lib/tailscale
      - ./tailscale/serve.json:/config/serve.json:ro

volumes:
  pgdata:
  miniodata:  # attachment blobs — backed up SEPARATELY from pg_dump (docs/deploy.md)
  ts-state:
  caddy-data:
  caddy-config:
