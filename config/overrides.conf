# Postgres tuning overrides — loaded via include_dir
# (settings here override the defaults from the auto-generated postgresql.conf)

# --- SSD planner hints ---
random_page_cost = 1.1
effective_io_concurrency = 200

# --- Memory sizing for 4GB OrbStack VM ---
shared_buffers = 1GB
effective_cache_size = 3GB
work_mem = 16MB
maintenance_work_mem = 256MB

# --- Parallelism (Apple Silicon has cores to spare) ---
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4

# --- Connection budget for personal use ---
max_connections = 25
